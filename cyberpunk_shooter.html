<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Infrastructure Initiative</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#020510;font-family:'Courier New',monospace;color:#fff;overflow:hidden;cursor:none;user-select:none;}
    #gameContainer{width:100vw;height:100vh;position:relative;display:flex;flex-direction:column;}
    #topArea{flex:1;position:relative;overflow:hidden;}
    #gameCanvas,#bgCanvas{display:block;position:absolute;top:0;left:0;}
    #bgCanvas{z-index:0;}
    #gameCanvas{z-index:1;}
    #crosshair{position:absolute;width:52px;height:52px;transform:translate(-50%,-50%);pointer-events:none;z-index:50;transition:filter 0.1s;}
    #crosshair.hot{filter:drop-shadow(0 0 8px #ff3a3a);}
    #crosshair svg{width:100%;height:100%;}
    #cooldownRing{position:absolute;width:64px;height:64px;transform:translate(-50%,-50%);pointer-events:none;z-index:49;opacity:0;}
    #hud{position:absolute;top:12px;left:12px;z-index:20;padding:12px 18px;background:rgba(0,10,30,0.82);border:1px solid rgba(0,229,255,0.4);border-radius:6px;backdrop-filter:blur(4px);min-width:240px;}
    #hud::before{content:'';position:absolute;top:-1px;left:16px;right:16px;height:2px;background:linear-gradient(90deg,transparent,#00e5ff,transparent);}
    .hud-row{display:flex;align-items:center;gap:8px;font-size:13px;color:#a0d8ef;margin-bottom:7px;letter-spacing:1px;}
    .hud-row:last-child{margin-bottom:0;}
    .hud-label{color:rgba(0,229,255,0.55);font-size:11px;text-transform:uppercase;min-width:60px;}
    .hud-val{color:#00e5ff;font-weight:bold;font-size:15px;}
    .hud-bar-track{flex:1;height:6px;background:rgba(0,229,255,0.12);border-radius:3px;overflow:hidden;}
    .hud-bar-fill{height:100%;border-radius:3px;transition:width 0.3s;}
    #livesDisplay{display:flex;gap:6px;align-items:center;}
    .life-pip{width:14px;height:14px;border-radius:50%;background:#00e5ff;box-shadow:0 0 8px #00e5ff;transition:all 0.3s;}
    .life-pip.dead{background:#1a1a2e;box-shadow:none;}
    #waveBadge{position:absolute;top:12px;right:12px;z-index:20;text-align:right;}
    #waveNum{font-size:40px;font-weight:900;color:#00e5ff;line-height:1;text-shadow:0 0 18px #00e5ff;}
    #waveLabel{font-size:10px;color:rgba(0,229,255,0.5);letter-spacing:3px;text-transform:uppercase;}
    #comboDisplay{position:absolute;bottom:130px;right:16px;z-index:20;text-align:right;font-size:11px;color:rgba(255,179,0,0.6);letter-spacing:2px;text-transform:uppercase;}
    #comboNum{display:block;font-size:42px;font-weight:900;color:#ffb300;line-height:1;text-shadow:0 0 20px #ffb300;transition:transform 0.1s;opacity:0;}
    #comboNum.show{opacity:1;}
    #comboNum.pop{transform:scale(1.5);}
    #scanlines{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:30;}
    #waveBanner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(22px,4vw,52px);font-weight:900;letter-spacing:8px;text-transform:uppercase;pointer-events:none;z-index:35;opacity:0;transition:opacity 0.3s;text-align:center;}
    #alarmOverlay{position:absolute;inset:0;pointer-events:none;z-index:28;opacity:0;background:rgba(255,0,0,0.07);transition:opacity 0.08s;}
    #titleScreen{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,#0d1f4a 0%,#020510 65%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:40;}
    #gameTitle{font-size:clamp(32px,6vw,68px);font-weight:900;letter-spacing:6px;text-transform:uppercase;color:#ff3a3a;text-shadow:0 0 10px #ff1744,0 0 30px #ff1744,0 0 70px rgba(255,23,68,0.5);margin-bottom:8px;}
    #gameTitle span{color:#00e5ff;text-shadow:0 0 10px #00e5ff,0 0 30px #00e5ff;}
    #gameSubtitle{font-size:clamp(10px,1.3vw,14px);color:#78a9c8;text-transform:uppercase;letter-spacing:3px;margin-bottom:32px;}
    #modeTitle{font-size:12px;color:rgba(0,229,255,0.7);text-transform:uppercase;letter-spacing:3px;margin-bottom:12px;}
    #modeButtons{display:flex;flex-direction:column;gap:9px;}
    .menuButton{min-width:280px;padding:11px 26px;border-radius:999px;border:1px solid rgba(0,229,255,0.5);background:rgba(0,20,50,0.7);color:#c8eeff;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;font-family:'Courier New',monospace;overflow:hidden;transition:all 0.2s ease;box-shadow:0 0 10px rgba(0,229,255,0.15);}
    .menuButton:hover{border-color:#00e5ff;color:#fff;box-shadow:0 0 22px rgba(0,229,255,0.5);transform:translateY(-2px);}
    .corner{position:absolute;width:22px;height:22px;border-color:#00e5ff;border-style:solid;}
    .corner.tl{top:18px;left:18px;border-width:2px 0 0 2px;}
    .corner.tr{top:18px;right:18px;border-width:2px 2px 0 0;}
    .corner.bl{bottom:18px;left:18px;border-width:0 0 2px 2px;}
    .corner.br{bottom:18px;right:18px;border-width:0 2px 2px 0;}
    #gameOverScreen{position:absolute;inset:0;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:45;}
    #gameOverTitle{font-size:clamp(28px,5vw,60px);font-weight:900;color:#ff3a3a;letter-spacing:6px;text-transform:uppercase;text-shadow:0 0 20px #ff1744;margin-bottom:6px;}
    #gameOverSub{font-size:13px;color:#78a9c8;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
    #finalScore{font-size:clamp(18px,3vw,32px);color:#00e5ff;font-weight:700;letter-spacing:3px;margin-bottom:4px;text-shadow:0 0 12px #00e5ff;}
    #finalWave{font-size:16px;color:#ffb300;letter-spacing:2px;margin-bottom:24px;}
    .gameOverButtons{display:flex;gap:14px;}
    .gameOverBtn{padding:11px 30px;font-size:15px;background:rgba(0,10,30,0.8);color:#fff;border:1px solid rgba(0,229,255,0.5);cursor:pointer;text-transform:uppercase;letter-spacing:2px;font-family:'Courier New',monospace;border-radius:4px;transition:all 0.2s;}
    .gameOverBtn:hover{background:rgba(0,229,255,0.12);border-color:#00e5ff;color:#00e5ff;}
    .gameOverBtn.quit{border-color:rgba(255,50,50,0.5);color:#ff6060;}
    .gameOverBtn.quit:hover{background:rgba(255,50,50,0.12);border-color:#ff3a3a;}
    #logConsole{height:110px;background:#020510;border-top:1px solid rgba(0,229,255,0.2);padding:5px 10px;font-family:'Courier New',monospace;font-size:11px;overflow-y:auto;}
    #logConsole::-webkit-scrollbar{width:3px;}
    #logConsole::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.3);border-radius:2px;}
    .log-line{margin:1px 0;white-space:nowrap;}
    .log-info{color:#29b6f6;}.log-resolved{color:#00e676;}.log-warning{color:#ffb300;}.log-error{color:#ff5252;}.log-debug{color:#546e7a;}
  </style>
</head>
<body>
<div id="gameContainer">
  <div id="topArea">
    <canvas id="bgCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>
    <div id="scanlines"></div>
    <div id="alarmOverlay"></div>

    <div id="crosshair">
      <svg viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="20" stroke="#00e5ff" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
        <circle cx="26" cy="26" r="11" stroke="#00e5ff" stroke-width="1.5" opacity="0.9"/>
        <circle cx="26" cy="26" r="2.5" fill="#00e5ff"/>
        <line x1="26" y1="2" x2="26" y2="13" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="26" y1="39" x2="26" y2="50" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="26" x2="13" y2="26" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="39" y1="26" x2="50" y2="26" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="26" cy="26" r="20" stroke="#ff3a3a" stroke-width="2" opacity="0" id="chLock"/>
      </svg>
    </div>

    <div id="cooldownRing">
      <svg viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="28" stroke="#ff3a3a" stroke-width="2.5"
          stroke-dasharray="176" stroke-dashoffset="176" id="cooldownArc"
          stroke-linecap="round" transform="rotate(-90 32 32)"/>
      </svg>
    </div>

    <div id="hud">
      <div class="hud-row">
        <span class="hud-label">SCORE</span>
        <span class="hud-val" id="score">0</span>
        <div class="hud-bar-track"><div class="hud-bar-fill" id="scoreBar" style="width:0%;background:linear-gradient(90deg,#00e5ff,#00ff88);box-shadow:0 0 6px #00e5ff;"></div></div>
      </div>
      <div class="hud-row">
        <span class="hud-label">LIVES</span>
        <div id="livesDisplay">
          <div class="life-pip" id="pip0"></div>
          <div class="life-pip" id="pip1"></div>
          <div class="life-pip" id="pip2"></div>
        </div>
      </div>
      <div class="hud-row">
        <span class="hud-label">MISSES</span>
        <span class="hud-val" id="misses">0</span>
        <div class="hud-bar-track"><div class="hud-bar-fill" id="missBar" style="width:0%;background:linear-gradient(90deg,#ffb300,#ff5252);box-shadow:0 0 5px #ff5252;"></div></div>
      </div>
      <div class="hud-row">
        <span class="hud-label">MODE</span>
        <span id="modeLabel" style="color:#ffb300;font-size:11px;letter-spacing:1px;">—</span>
      </div>
    </div>

    <div id="waveBadge">
      <div id="waveNum">1</div>
      <div id="waveLabel">WAVE</div>
    </div>

    <div id="comboDisplay">
      <span>COMBO</span>
      <span id="comboNum">x0</span>
    </div>

    <div id="waveBanner"></div>

    <div id="titleScreen">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div id="gameTitle">INFRA<span>STRUCTURE</span> INITIATIVE</div>
      <div id="gameSubtitle">v3.0 &nbsp;·&nbsp; 3 Lives &nbsp;·&nbsp; Escalating Waves &nbsp;·&nbsp; Homing Threats</div>
      <div id="modeTitle">▸ Select Operational Mode</div>
      <div id="modeButtons">
        <button class="menuButton" data-mode="oncall">🟢 &nbsp;On-Call Simulation</button>
        <button class="menuButton" data-mode="warroom">🔴 &nbsp;War Room Mode</button>
        <button class="menuButton" data-mode="changewindow">🟡 &nbsp;Change Window</button>
        <button class="menuButton" data-mode="compliance">🔵 &nbsp;Compliance Gauntlet</button>
        <button class="menuButton" data-mode="chaos">⚡ &nbsp;Chaos Engineering</button>
      </div>
    </div>

    <div id="gameOverScreen">
      <div id="gameOverTitle">INCIDENT OVER</div>
      <div id="gameOverSub">SYSTEMS OFFLINE — DATA SCRUBBED</div>
      <div id="finalScore">SCORE: <span id="finalScoreNum">0</span></div>
      <div id="finalWave">SURVIVED TO WAVE <span id="finalWaveNum">1</span></div>
      <div class="gameOverButtons">
        <button class="gameOverBtn" id="restartBtn">↺ RESTART</button>
        <button class="gameOverBtn quit" id="quitBtn">✕ QUIT</button>
      </div>
    </div>
  </div>
  <div id="logConsole"></div>
</div>

<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const bgCanvas=document.getElementById('bgCanvas'),bgCtx=bgCanvas.getContext('2d');
const topArea=document.getElementById('topArea');
function resize(){canvas.width=bgCanvas.width=topArea.clientWidth;canvas.height=bgCanvas.height=topArea.clientHeight;}
resize();window.addEventListener('resize',resize);

const chLock=document.getElementById('chLock');
const cooldownRingEl=document.getElementById('cooldownRing');
const cooldownArc=document.getElementById('cooldownArc');
const scoreEl=document.getElementById('score');
const scoreBar=document.getElementById('scoreBar');
const missesEl=document.getElementById('misses');
const missBar=document.getElementById('missBar');
const modeLabelEl=document.getElementById('modeLabel');
const comboNumEl=document.getElementById('comboNum');
const waveBanner=document.getElementById('waveBanner');
const alarmOverlay=document.getElementById('alarmOverlay');
const waveNumEl=document.getElementById('waveNum');
const gameOverScreen=document.getElementById('gameOverScreen');
const titleScreen=document.getElementById('titleScreen');
const logConsole=document.getElementById('logConsole');
const crosshairEl=document.getElementById('crosshair');
const pips=[0,1,2].map(i=>document.getElementById('pip'+i));

let incidents=[],forbidden=[],particles=[],shockwaves=[],trails=[];
let score=0,misses=0,combo=0,lives=3,wave=1,waveKills=0,killsToNext=10;
let gameOver=false,gameRunning=false;
let baseSpawnInterval=1300,spawnInterval=1300,forbiddenChance=0.40,speedMult=1.0;
let lastSpawnTime=0;
let shake={x:0,y:0,t:0};
let flashAlpha=0,flashCol='#fff';
let lockTarget=null;
let shootCD=0;
const SHOOT_DELAY=300;
let missStreak=0;
let bgTime=0,gridOffset=0,alarmOn=0;
let stars=[];
for(let i=0;i<200;i++)stars.push({x:Math.random()*2000,y:Math.random()*1200,r:Math.random()*1.4+0.2,spd:Math.random()*0.35+0.04,a:Math.random()*0.8+0.2});

const mouse={x:400,y:300};
topArea.addEventListener('mousemove',e=>{
  const r=topArea.getBoundingClientRect();
  mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;
  crosshairEl.style.left=mouse.x+'px';crosshairEl.style.top=mouse.y+'px';
  cooldownRingEl.style.left=mouse.x+'px';cooldownRingEl.style.top=mouse.y+'px';
});
topArea.addEventListener('click',()=>{if(!gameOver&&gameRunning)shoot();});

function log(lvl,msg){
  const el=document.createElement('div');
  el.className='log-line log-'+lvl;
  el.textContent='['+new Date().toISOString().split('T')[1].split('.')[0]+'] '+msg;
  logConsole.appendChild(el);
  while(logConsole.children.length>100)logConsole.removeChild(logConsole.firstChild);
  logConsole.scrollTop=logConsole.scrollHeight;
}

const MODES={
  oncall:      {label:'ON-CALL SIMULATION',   si:1200,fc:0.40,sm:1.0},
  warroom:     {label:'WAR ROOM MODE',         si:850, fc:0.55,sm:1.3},
  changewindow:{label:'CHANGE WINDOW',         si:1000,fc:0.62,sm:1.15},
  compliance:  {label:'COMPLIANCE GAUNTLET',   si:1100,fc:0.80,sm:0.95},
  chaos:       {label:'CHAOS ENGINEERING',     si:520, fc:0.62,sm:1.75},
};

document.querySelectorAll('.menuButton').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const c=MODES[btn.dataset.mode];
    baseSpawnInterval=c.si;spawnInterval=c.si;forbiddenChance=c.fc;speedMult=c.sm;
    modeLabelEl.textContent=c.label;
    titleScreen.style.display='none';
    gameRunning=true;
    startMusic();
    showBanner('SYSTEMS ONLINE','#00e5ff');
    log('info','Mode: '+c.label+' | Wave 1 — resolve '+killsToNext+' incidents');
  });
});
document.getElementById('restartBtn').addEventListener('click',()=>location.reload());
document.getElementById('quitBtn').addEventListener('click',()=>{window.location.href='index.html';});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&gameRunning&&!gameOver){if(confirm('Quit?'))window.location.href='index.html';}});

function showBanner(txt,col){
  waveBanner.textContent=txt;
  waveBanner.style.color=col||'#00e5ff';
  waveBanner.style.textShadow='0 0 20px '+(col||'#00e5ff');
  waveBanner.style.opacity='1';
  setTimeout(()=>waveBanner.style.opacity='0',1800);
}

function updateLives(){pips.forEach((p,i)=>p.classList.toggle('dead',i>=lives));}

function loseLife(reason){
  if(gameOver)return;
  lives--;updateLives();
  flashAlpha=0.6;flashCol='#ff0000';
  shake.x=20;shake.y=20;shake.t=30;
  playDamageSFX();
  log('error','LIFE LOST: '+reason+' ['+lives+' left]');
  if(lives<=0)triggerGameOver(reason);
  else showBanner('LIFE LOST — '+lives+' REMAINING','#ff3a3a');
}

function advanceWave(){
  wave++;waveKills=0;
  killsToNext=10+wave*3;
  waveNumEl.textContent=wave;
  spawnInterval=Math.max(280,baseSpawnInterval-wave*90);
  forbiddenChance=Math.min(0.88,forbiddenChance+0.07);
  speedMult+=0.14;
  showBanner('WAVE '+wave+' — ESCALATING','#ffb300');
  log('warning','WAVE '+wave+' | spd:'+speedMult.toFixed(2)+' stops:'+Math.round(forbiddenChance*100)+'%');
  // Burst spawn on wave up
  const n=Math.min(wave+1,7);
  for(let i=0;i<n;i++)setTimeout(()=>createIncident(),i*110);
}

function spawnEdge(radius){
  const side=Math.floor(Math.random()*4);
  const spd=(1.3+Math.random()*1.7)*speedMult;
  let x,y,vx,vy;
  if(side===0){x=-radius;y=Math.random()*canvas.height;vx=spd;vy=(Math.random()-.5)*spd*.7;}
  else if(side===1){x=canvas.width+radius;y=Math.random()*canvas.height;vx=-spd;vy=(Math.random()-.5)*spd*.7;}
  else if(side===2){x=Math.random()*canvas.width;y=-radius;vx=(Math.random()-.5)*spd*.7;vy=spd;}
  else{x=Math.random()*canvas.width;y=canvas.height+radius;vx=(Math.random()-.5)*spd*.7;vy=-spd;}
  return{x,y,vx,vy};
}

const TYPES=[
  {label:'Kafka Overload',   col:'#ffb300',glow:'#ff8f00',shape:'hex'},
  {label:'Hadoop Failure',   col:'#00e676',glow:'#00c853',shape:'hex'},
  {label:'Spark Explosion',  col:'#ff5252',glow:'#ff1744',shape:'dia'},
  {label:'Zookeeper Desync', col:'#e040fb',glow:'#aa00ff',shape:'dia'},
  {label:'DB Deadlock',      col:'#40c4ff',glow:'#0091ea',shape:'hex'},
  {label:'Pipeline Timeout', col:'#ff6d00',glow:'#e65100',shape:'dia'},
  {label:'Memory Leak',      col:'#69f0ae',glow:'#00e676',shape:'hex'},
  {label:'CPU Spike',        col:'#ff4081',glow:'#f50057',shape:'dia'},
];

function createIncident(){
  const T=TYPES[Math.floor(Math.random()*TYPES.length)];
  const baseR=Math.max(14,26-wave*1.0);
  const radius=baseR+Math.random()*8;
  const {x,y,vx,vy}=spawnEdge(radius);
  const homingP=wave>=6?0.65:wave>=3?0.35:0;
  const homing=Math.random()<homingP;
  const timed=!homing&&wave>=4&&Math.random()<0.28;
  const decoy=!homing&&!timed&&wave>=5&&Math.random()<0.20;
  incidents.push({
    x,y,vx,vy,radius,
    label:decoy?T.label+' [?]':T.label,
    col:T.col,glow:T.glow,shape:T.shape,
    alive:true,pulseT:Math.random()*Math.PI*2,angle:0,innerAngle:0,
    homing,decoy,timed,timerLeft:timed?(2200-wave*60):null,
  });
}

function createForbidden(){
  const radius=28+Math.random()*10;
  const spd=(1.8+Math.random()*2.2)*speedMult;
  const {x,y,vx,vy}=spawnEdge(radius);
  const sd=Math.random()>.5?1:-1;
  forbidden.push({
    x,y,vx,vy,radius,
    label:['Compliance Review','Audit Control','SOX Checkpoint','Unapproved Change','Risk Assessment','Security Exception'][Math.floor(Math.random()*6)],
    alive:true,angle:Math.random()*Math.PI*2,pulseT:0,
    spinSpeed:(0.07+Math.random()*0.10)*sd,
    swerveT:0,swerveInt:350+Math.random()*650,
  });
}

function spawnExplosion(x,y,col,glow,big){
  const n=big?65:38;
  for(let r=0;r<(big?4:3);r++)shockwaves.push({x,y,r:8+r*14,col,alpha:0.9,spd:3.5+r*2});
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*(big?12:7);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:1.5+Math.random()*4,alpha:1,decay:0.014+Math.random()*0.024,col:Math.random()>.4?col:'#fff',glow,gravity:0.07});
  }
  shake.x=(Math.random()-.5)*(big?24:13);shake.y=(Math.random()-.5)*(big?24:13);shake.t=big?30:18;
  flashAlpha=big?0.48:0.3;flashCol='#fff';
  playExplosionSFX();
}

function hexPath(cx,cy,r,a){ctx.beginPath();for(let i=0;i<6;i++){const ang=a+i*Math.PI/3;i?ctx.lineTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang)):ctx.moveTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang));}ctx.closePath();}
function diaPath(cx,cy,r,a){ctx.beginPath();for(let i=0;i<4;i++){const ang=a+i*Math.PI/2+Math.PI/4;i?ctx.lineTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang)):ctx.moveTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang));}ctx.closePath();}
function octPath(cx,cy,r,a){ctx.beginPath();for(let i=0;i<8;i++){const ang=a+i*Math.PI/4;i?ctx.lineTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang)):ctx.moveTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang));}ctx.closePath();}
function shapePath(shape,cx,cy,r,a){if(shape==='hex')hexPath(cx,cy,r,a);else diaPath(cx,cy,r*1.1,a);}

function drawIncident(inc){
  const {x,y,radius,col,glow,shape,angle,innerAngle,pulseT,homing,decoy,timed,timerLeft}=inc;
  const pulse=0.86+0.14*Math.sin(pulseT);
  const r=radius*pulse;
  const locked=(lockTarget===inc);
  ctx.save();
  if(homing){
    ctx.globalAlpha=0.3+0.25*Math.sin(pulseT*2.2);

function shoot(){
  if(shootCD>0){crosshairEl.classList.add('hot');setTimeout(()=>crosshairEl.classList.remove('hot'),180);return;}
  shootCD=SHOOT_DELAY;
  let hit=false;
  forbidden.forEach(f=>{
    if(Math.sqrt((mouse.x-f.x)**2+(mouse.y-f.y)**2)<f.radius){
      hit=true;loseLife('Shot forbidden: '+f.label);
      spawnExplosion(f.x,f.y,'#ff1744','#ff0000',true);f.alive=false;
    }
  });
  forbidden=forbidden.filter(f=>f.alive);
  if(gameOver)return;
  incidents.forEach(inc=>{
    if(Math.sqrt((mouse.x-inc.x)**2+(mouse.y-inc.y)**2)<inc.radius){
      inc.alive=false;hit=true;
      if(inc.decoy){
        loseLife('Decoy trap: '+inc.label);
        spawnExplosion(inc.x,inc.y,'#ff1744','#ff0000',true);
      } else {
        score++;waveKills++;
        scoreEl.textContent=score;
        scoreBar.style.width=Math.min(score*1.5,100)+'%';
        combo++;missStreak=0;
        comboNumEl.textContent='x'+combo;
        comboNumEl.classList.add('show','pop');
        setTimeout(()=>comboNumEl.classList.remove('pop'),160);
        spawnExplosion(inc.x,inc.y,inc.col,inc.glow,false);
        log('resolved','✓ '+inc.label+(combo>2?' [x'+combo+']':''));
        if(combo%5===0)showBanner('COMBO x'+combo+'!','#ffb300');
        playShootSFX();
        if(waveKills>=killsToNext)advanceWave();
      }
    }
  });
  incidents=incidents.filter(i=>i.alive);
  if(!hit){
    missStreak++;misses++;
    missesEl.textContent=misses;
    missBar.style.width=Math.min(misses*3,100)+'%';
    combo=0;comboNumEl.textContent='x0';comboNumEl.classList.remove('show');
    if(missStreak>=4){loseLife(missStreak+' consecutive misses');missStreak=0;}
    playMissSFX();
  }
}

function triggerGameOver(reason){
  if(gameOver)return;gameOver=true;gameRunning=false;
  document.getElementById('finalScoreNum').textContent=score;
  document.getElementById('finalWaveNum').textContent=wave;
  gameOverScreen.style.display='flex';
  stopMusic();playGameOverSFX();
  log('error','GAME OVER: '+reason);
}

let lastTime=performance.now();
function update(t,dt){
  if(!gameRunning||gameOver)return;
  shootCD=Math.max(0,shootCD-dt);
  if(shootCD>0){
    const f=1-(shootCD/SHOOT_DELAY);
    cooldownArc.setAttribute('stroke-dashoffset',176*(1-f));
    cooldownRingEl.style.opacity='0.9';
  } else {cooldownRingEl.style.opacity='0';}

  if(t-lastSpawnTime>spawnInterval){
    createIncident();
    if(Math.random()<forbiddenChance)createForbidden();
    if(wave>=5&&Math.random()<0.35)createForbidden();
    if(wave>=8&&Math.random()<0.4)createIncident();
    lastSpawnTime=t;
  }

  lockTarget=null;let closestD=Infinity;
  incidents.forEach(inc=>{
    if(inc.homing){
      const dx=mouse.x-inc.x,dy=mouse.y-inc.y,d=Math.sqrt(dx*dx+dy*dy);
      const tr=Math.min(0.055+wave*0.005,0.12)*speedMult;
      inc.vx+=dx/d*tr;inc.vy+=dy/d*tr;
      const s=Math.sqrt(inc.vx*inc.vx+inc.vy*inc.vy),mx=3.8*speedMult;
      if(s>mx){inc.vx=inc.vx/s*mx;inc.vy=inc.vy/s*mx;}
    }
    inc.x+=inc.vx;inc.y+=inc.vy;
    inc.angle+=0.014;inc.innerAngle-=0.028;inc.pulseT+=0.06;
    if(inc.timed&&inc.timerLeft!=null){
      inc.timerLeft-=dt;
      if(inc.timerLeft<=0){inc.alive=false;loseLife('Timed expired: '+inc.label);spawnExplosion(inc.x,inc.y,'#ff9100','#ff6d00',false);}
    }
    if(Math.random()>.5)trails.push({x:inc.x,y:inc.y,r:inc.radius*.2,alpha:.32,col:inc.homing?'#ff6d00':inc.col,decay:.04});
    const dx=mouse.x-inc.x,dy=mouse.y-inc.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<inc.radius+30&&d<closestD){closestD=d;lockTarget=inc;}
    if(inc.x<-140||inc.x>canvas.width+140||inc.y<-140||inc.y>canvas.height+140){
      inc.alive=false;
      if(!inc.decoy){combo=0;comboNumEl.textContent='x0';comboNumEl.classList.remove('show');loseLife('Escaped: '+inc.label);}
    }
  });
  incidents=incidents.filter(i=>i.alive);

  alarmOn=0;
  forbidden.forEach(f=>{
    f.swerveT+=dt;
    if(f.swerveT>f.swerveInt){
      f.swerveT=0;f.swerveInt=300+Math.random()*600;
      const s=Math.sqrt(f.vx*f.vx+f.vy*f.vy),na=Math.random()*Math.PI*2;
      f.vx=Math.cos(na)*s;f.vy=Math.sin(na)*s;
    }
    f.x+=f.vx;f.y+=f.vy;f.angle+=f.spinSpeed;f.pulseT+=0.07;
    if(Math.random()>.4)trails.push({x:f.x,y:f.y,r:f.radius*.2,alpha:.5,col:'#ff1744',decay:.06});
    const dx=mouse.x-f.x,dy=mouse.y-f.y;
    if(Math.sqrt(dx*dx+dy*dy)<f.radius*2.8)alarmOn=1;
    if(f.x<-170||f.x>canvas.width+170||f.y<-170||f.y>canvas.height+170)f.alive=false;
  });
  forbidden=forbidden.filter(f=>f.alive);

  alarmOverlay.style.opacity=alarmOn?'1':'0';
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.97;p.vy*=.97;p.alpha-=p.decay;});
  particles=particles.filter(p=>p.alpha>0);
  shockwaves.forEach(s=>{s.r+=s.spd;s.alpha-=.027;});
  shockwaves=shockwaves.filter(s=>s.alpha>0);
  trails.forEach(tr=>tr.alpha-=tr.decay);
  trails=trails.filter(tr=>tr.alpha>0);
  if(shake.t>0){shake.t--;shake.x*=.78;shake.y*=.78;}else{shake.x=0;shake.y=0;}
  flashAlpha=Math.max(0,flashAlpha-.022);
  chLock.style.opacity=lockTarget?'1':'0';
  bgTime+=dt;
}

function draw(t){
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.save();ctx.translate(shake.x,shake.y);
  trails.forEach(tr=>{ctx.globalAlpha=tr.alpha;ctx.fillStyle=tr.col;ctx.beginPath();ctx.arc(tr.x,tr.y,tr.r,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  shockwaves.forEach(s=>{ctx.globalAlpha=s.alpha;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.strokeStyle=s.col;ctx.lineWidth=3;ctx.shadowBlur=14;ctx.shadowColor=s.col;ctx.stroke();ctx.shadowBlur=0;});
  ctx.globalAlpha=1;
  particles.forEach(p=>{ctx.globalAlpha=p.alpha;ctx.shadowBlur=8;ctx.shadowColor=p.glow;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
  ctx.globalAlpha=1;
  forbidden.forEach(f=>drawForbidden(f,t));
  incidents.forEach(inc=>drawIncident(inc));
  if(flashAlpha>0){ctx.globalAlpha=flashAlpha;ctx.fillStyle=flashCol;ctx.fillRect(-10,-10,w+20,h+20);ctx.globalAlpha=1;}
  ctx.restore();
}

(function loop(t){const dt=t-lastTime;lastTime=t;drawBackground(t);update(t,dt);draw(t);requestAnimationFrame(loop);})(performance.now());

function playDamageSFX(){if(!audioCtx)return;for(let i=0;i<3;i++){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(440-i*80,audioCtx.currentTime+i*.08);o.frequency.exponentialRampToValueAtTime(60,audioCtx.currentTime+i*.08+.25);g.gain.setValueAtTime(.35,audioCtx.currentTime+i*.08);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+i*.08+.28);o.connect(g);g.connect(sfxGain);o.start(audioCtx.currentTime+i*.08);o.stop(audioCtx.currentTime+i*.08+.3);}}
function playGameOverSFX(){if(!audioCtx)return;[440,330,220,110].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(f,audioCtx.currentTime+i*.18);g.gain.setValueAtTime(.4,audioCtx.currentTime+i*.18);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+i*.18+.35);o.connect(g);g.connect(sfxGain);o.start(audioCtx.currentTime+i*.18);o.stop(audioCtx.currentTime+i*.18+.38);});}
